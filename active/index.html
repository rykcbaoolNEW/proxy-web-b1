<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>UV v1</title>
    <script defer src="scripts/lstimer.js"></script>

    <link rel="stylesheet" href="style/browser.css?v=larger-tabs-1" />

    <script
      type="text/javascript"
      src="https://cdn.jsdelivr.net/gh/vanjs-org/van/public/van-1.5.2.nomodule.min.js"
    ></script>

    <script
      type="module"
      src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"
    ></script>
    <script
      nomodule
      src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"
    ></script>

    <script src="uv/uv.bundle.js" defer></script>
    <script src="uv/uv.config.js" defer></script>
    <script src="scripts/tabs.mjs?v=larger-tabs-1" type="module" defer></script>
  </head>

  <body>
    <div id="small-screen-overlay">
      This does not support small screens, sorry!
    </div>

    <div id="nav"></div>
    <div id="main-content"></div>

    <div id="tab-view" class=""></div>
    <div class="sidebar-container">
      <header>
        <div class="page-data">
          <span id="controls">
            <span>
              <button id="page-back">
                <ion-icon
                  name="arrow-back-outline"
                  class="icon hover-focus1"
                ></ion-icon>
                <p class="tooltip">Back</p>
              </button>
              <button id="page-forward">
                <ion-icon
                  name="arrow-forward-outline"
                  class="icon hover-focus1"
                ></ion-icon>
                <p class="tooltip">Forward</p>
              </button>
              <button id="page-refresh">
                <ion-icon
                  name="refresh-outline"
                  class="icon hover-focus1"
                ></ion-icon>
                <p class="tooltip">Refresh</p>
              </button>
              <button id="options-btn">
                <ion-icon
                  name="menu-outline"
                  class="icon hover-focus1"
                ></ion-icon>
                <p class="tooltip">Menu</p>
              </button>
            </span>
          </span>
          <form id="url-form">
            <input
              type="text"
              id="url-input"
              onfocus="this.setSelectionRange(0, this.value.length)"
              class="hover-focus2"
              placeholder="Search or enter URL"
              autocomplete="off"
              autocorrect="off"
              spellcheck="false"
            />
          </form>
        </div>
        <div class="tabs-bar">
          <div id="tab-list"></div>
          <button id="new-tab" class="hover-focus2" aria-label="New tab">
            <ion-icon name="add-outline" class="icon"></ion-icon>
          </button>
        </div>
      </header>
    </div>

    <div id="menu-overlay">
      <div class="option" id="devtools-option">Developer Tools</div>
      <div class="option" id="abc-option">Open in about:blank</div>
      <div class="option" id="credits-option">Credits</div>
    </div>
    <script>
      const optionsBtn = document.getElementById("options-btn");
      const overlay = document.getElementById("menu-overlay");
      optionsBtn.addEventListener("click", () => {
        overlay.classList.toggle("active");
      });
    </script>
  </body>
</html>
